<div id="fps"></div>
<script>
if (null == window.localStorage.getItem("fpson") || "1" == window.localStorage.getItem("fpson")) {
    var rAF = window.requestAnimationFrame || window.webkitRequestAnimationFrame || function (e) {
        window.setTimeout(e, 1000 / 60);
    },
    frame = 0,
    allFrameCount = 0,
    lastTime = Date.now(),
    lastFameTime = Date.now(),
    loop = function () {
        var e = Date.now(),
            t = e - lastFameTime,
            n = Math.round(1000 / t);
        lastFameTime = e, allFrameCount++, frame++, e > 1000 + lastTime && (
            n = Math.round(1000 * frame / (e - lastTime) / 2), // 为什么除2？？？
            fpsText = n <= 5 ? '<span style="color:#bd0000">卡成ppt🤢</span>' :
                n <= 15 ? '<span style="color:red">电竞级帧率😖</span>' :
                    n <= 30 ? '<span style="color:orange">有点难受😨</span>' :
                        n < 45 ? '<span style="color:#9338e6">不太流畅🙄</span>' :
                            n <= 60 ? '<span style="color:#08b7e4">还不错哦😁</span>' :
                                '<span style="color:#39c5bb">十分流畅🤣</span>',
            document.getElementById("fps").innerHTML = `FPS:${n} ${fpsText}`,
            frame = 0, lastTime = e
        );
        rAF(loop);
    };
    loop();
} else {
    document.getElementById("fps").style = "display:none!important";
}
</script>
